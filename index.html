<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tos Leng - Mobile</title>
    <style>
        :root { --gold: #d4af37; --felt: #1a5e37; --wood: #3d2b1f; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: white; text-align: center; }
        
        #lang-toggle { position: absolute; top: 20px; right: 20px; background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #game-area { display: none; height: 100vh; display: flex; flex-direction: column; }
        #poker-table { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: var(--felt); overflow-y: auto; }
        
        .player-spot { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--gold); }
        .card-row { display: flex; justify-content: center; gap: 5px; margin-top: 8px; }
        .card-img { width: 35px; height: 50px; background: white; border-radius: 3px; }
        
        .controls { padding: 15px; background: #111; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; background: var(--gold); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<button id="lang-toggle" onclick="cycleLanguage()">🇰🇭 KM</button>

<div id="login-screen">
    <h1 id="txt-title" style="color:var(--gold)">TOS LENG</h1>
    <input id="roomInput" class="login-input" placeholder="Room Name">
    <input id="passInput" class="login-input" type="password" placeholder="Password">
    <input id="nameInput" class="login-input" placeholder="Your Name">
    <button onclick="join()" id="btn-join" style="width:300px; padding:15px; background:var(--gold);">JOIN</button>
</div>

<div id="game-area">
    <div id="poker-table">
        </div>
    <div class="controls">
        <button onclick="deal()" id="btn-deal">DEAL</button>
        <button onclick="reveal()" id="btn-reveal">REVEAL</button>
    </div>
</div>

<script>
    const languages = ['km', 'en', 'cn', 'jp'];
    let langIndex = 0;
    const langData = {
        km: { title: "ទាស់លេង", room: "ឈ្មោះបន្ទប់", pass: "លេខកូដ", name: "ឈ្មោះ", btn: "ចូលលេង", flag: "🇰🇭 KM", deal: "ចែកបៀ", reveal: "បើកបៀ" },
        en: { title: "TOS LENG", room: "Room Name", pass: "Password", name: "Your Name", btn: "JOIN", flag: "🇺🇸 EN", deal: "DEAL", reveal: "REVEAL" },
        cn: { title: "讨冷", room: "房间名称", pass: "密码", name: "名字", btn: "进入", flag: "🇨🇳 CN", deal: "发牌", reveal: "摊牌" },
        jp: { title: "トスレン", room: "ルーム名", pass: "パスワード", name: "お名前", btn: "参加", flag: "🇯🇵 JP", deal: "配る", reveal: "公開" }
    };

    function cycleLanguage() {
        langIndex = (langIndex + 1) % languages.length;
        const l = langData[languages[langIndex]];
        document.getElementById("lang-toggle").innerText = l.flag;
        document.getElementById("txt-title").innerText = l.title;
        document.getElementById("roomInput").placeholder = l.room;
        document.getElementById("passInput").placeholder = l.pass;
        document.getElementById("nameInput").placeholder = l.name;
        document.getElementById("btn-join").innerText = l.btn;
        document.getElementById("btn-deal").innerText = l.deal;
        document.getElementById("btn-reveal").innerText = l.reveal;
    }

    function join() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("game-area").style.display = "flex";
    }
</script>
</body>
</html>
