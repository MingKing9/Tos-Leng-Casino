<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tos Leng Table</title>

<style>

body{
margin:0;
font-family:Arial;
background:#134b2c;
color:white;
}

button{
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

input,select{
padding:12px;
border-radius:10px;
border:none;
width:250px;
}

#login{
position:absolute;
inset:0;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:12px;
}

#game{
display:none;
}

#topbar{
background:#000;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#table{
display:flex;
flex-wrap:wrap;
gap:15px;
padding:20px;
justify-content:center;
}

.player{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
width:140px;
}

.money{
color:#00ff99;
font-size:14px;
}

#controls{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.row{
display:flex;
gap:8px;
justify-content:center;
}

.btn{
background:#d4af37;
color:black;
}

#lang{
position:absolute;
top:10px;
right:10px;
}

</style>
</head>

<body>

<div id="login">

<h2>TOS LENG</h2>

<select id="lang" onchange="setLang(this.value)">
<option value="en">English</option>
<option value="kh">ខ្មែរ</option>
<option value="zh">中文</option>
</select>

<input id="room" placeholder="Room Name">

<input id="pass" placeholder="Password">

<input id="name" placeholder="Your Name">

<input id="money" type="number" value="50000">

<button class="btn" onclick="join()">START GAME</button>

</div>


<div id="game">

<div id="topbar">

<div id="roomLabel"></div>

<div id="pot">POT: 0</div>

</div>

<div id="table"></div>

<div id="controls">

<div class="row">

<select id="target"></select>

<input id="amount" type="number" placeholder="Amount">

<button class="btn" onclick="sendMoney()">Send Money</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";


const firebaseConfig = {

apiKey:"AIzaSyBjsVUxlNjGUnYioHOlKmk1wEMoVTSVxLw",

authDomain:"the-family-card-game.firebaseapp.com",

databaseURL:"https://the-family-card-game-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"the-family-card-game"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room;
let player;


window.join = function(){

room = document.getElementById("room").value.trim();
player = document.getElementById("name").value.trim();

let startMoney = parseInt(document.getElementById("money").value);

if(!room || !player){

alert("Please enter room and name");

return;

}

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("roomLabel").innerText="ROOM: "+room;

set(ref(db,"rooms/"+room+"/money/"+player),startMoney);

listenRoom();

};


function listenRoom(){

onValue(ref(db,"rooms/"+room),snap=>{

const data=snap.val();

if(!data) return;

const players=data.money||{};

const table=document.getElementById("table");

table.innerHTML="";

let pot=0;

const target=document.getElementById("target");

target.innerHTML="";

Object.keys(players).forEach(p=>{

let m=players[p];

pot+=m;

const div=document.createElement("div");

div.className="player";

div.innerHTML="<b>"+p+"</b><div class='money'>"+m+" riel</div>";

table.appendChild(div);

if(p!==player){

const op=document.createElement("option");

op.value=p;

op.innerText=p;

target.appendChild(op);

}

});

document.getElementById("pot").innerText="POT: "+pot;

});

}


window.sendMoney=function(){

const to=document.getElementById("target").value;

const amount=parseInt(document.getElementById("amount").value);

if(!amount) return;

const moneyRef=ref(db,"rooms/"+room+"/money");

get(moneyRef).then(snap=>{

let data=snap.val();

let myMoney=data[player]||0;

let other=data[to]||0;

myMoney-=amount;

other+=amount;

update(ref(db),{

["rooms/"+room+"/money/"+player]:myMoney,

["rooms/"+room+"/money/"+to]:other

});

});

};


window.setLang=function(lang){

if(lang==="kh"){

document.getElementById("room").placeholder="ឈ្មោះបន្ទប់";
document.getElementById("pass").placeholder="លេខសម្ងាត់";
document.getElementById("name").placeholder="ឈ្មោះអ្នក";
}

if(lang==="zh"){

document.getElementById("room").placeholder="房间名称";
document.getElementById("pass").placeholder="密码";
document.getElementById("name").placeholder="玩家名字";
}

};

</script>

</body>
</html>
