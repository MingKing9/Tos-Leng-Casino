<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tos Leng</title>
<style>
    body { margin:0; font-family: sans-serif; background:#0a2114; color:white; }
    #login { position:fixed; inset:0; background:black; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    input { padding:12px; margin:5px; width:80%; border-radius:8px; border:none; text-align:center; }
    button { padding:12px; margin:5px; width:80%; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
    #game { display:none; padding:10px; }
    #table { height:35vh; border:4px solid #3d2b1f; border-radius:20px; margin-bottom:10px; }
    #history { height:40vh; background:rgba(0,0,0,0.5); overflow-y:auto; padding:10px; border-radius:10px; font-size:14px; }
</style>
</head>
<body>

<div id="login">
    <h2 style="color:gold">TOS LENG</h2>
    <input id="room" placeholder="Room Name">
    <input id="name" placeholder="Your Name">
    <input id="startAmount" type="number" value="50000">
    <button id="startBtn" style="background:gold">JOIN GAME</button>
</div>

<div id="game">
    <div id="table"></div>
    <div id="history"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
        <button id="dealBtn">Deal</button>
        <button id="transferBtn" style="background:gold">Transfer</button>
        <button id="chatBtn" style="background:#007bff; color:white">Chat</button>
        <button id="revealBtn">Reveal</button>
    </div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import {getDatabase,ref,set,onValue,get,update,push} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"

const db = getDatabase(initializeApp({
    databaseURL: "https://the-family-card-game-default-rtdb.asia-southeast1.firebasedatabase.app"
}));

let room, player;

document.getElementById("startBtn").onclick = async () => {
    room = document.getElementById("room").value.toLowerCase();
    player = document.getElementById("name").value;
    let initialMoney = parseInt(document.getElementById("startAmount").value);
    
    if(!room || !player) return alert("Enter room and name");

    // Only set money if wallet doesn't exist
    const walletRef = ref(db, `rooms/${room}/wallets/${player}`);
    const snap = await get(walletRef);
    if(!snap.exists()) await set(walletRef, initialMoney);

    document.getElementById("login").style.display = "none";
    document.getElementById("game").style.display = "block";
    listen();
};

function listen() {
    onValue(ref(db, `rooms/${room}`), snap => {
        const data = snap.val() || {};
        // Display Players & Wallets
        let html = "Players: ";
        if(data.wallets) {
            Object.keys(data.wallets).forEach(p => html += `${p}(${data.wallets[p]}) `);
        }
        document.getElementById("table").innerHTML = html;

        // Display Chat/History
        const hist = document.getElementById("history");
        hist.innerHTML = "";
        if(data.history) {
            Object.values(data.history).reverse().forEach(m => hist.innerHTML += `<div>${m}</div>`);
        }
    });
}

document.getElementById("transferBtn").onclick = async () => {
    const snap = await get(ref(db, `rooms/${room}/wallets`));
    const wallets = snap.val();
    const names = Object.keys(wallets).filter(n => n !== player);
    
    let msg = "Select target:\n";
    names.forEach((n, i) => msg += `${i}: ${n}\n`);
    const idx = prompt(msg);
    if(idx === null || !names[idx]) return;

    const target = names[idx];
    const amt = parseInt(prompt(`Send to ${target}. Amount:`));
    
    if(amt > 0 && wallets[player] >= amt) {
        const updates = {};
        updates[`rooms/${room}/wallets/${player}`] = wallets[player] - amt;
        updates[`rooms/${room}/wallets/${target}`] = wallets[target] + amt;
        await update(ref(db), updates);
        await push(ref(db, `rooms/${room}/history`), `💸 ${player} sent ${amt} to ${target}`);
    }
};

document.getElementById("chatBtn").onclick = () => {
    const msg = prompt("Message:");
    if(msg) push(ref(db, `rooms/${room}/history`), `💬 ${player}: ${msg}`);
};
</script>
</body>
</html>
