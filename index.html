<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tos Leng Casino</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f3b24;
color:white;
overflow:hidden;
}

#login{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
gap:10px;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:250px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

.btn{
background:#d4af37;
color:black;
}

#topbar{
height:50px;
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

#pot{
font-weight:bold;
color:#ffd700;
}

#table{
position:absolute;
top:50px;
bottom:120px;
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.player{
background:#1e1e1e;
padding:10px;
border-radius:10px;
text-align:center;
width:130px;
}

.money{
color:#00ff90;
font-size:14px;
}

.cardrow{
display:flex;
gap:3px;
margin-top:5px;
}

.cardrow img{
width:30px;
}

#controls{
position:absolute;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.row{
display:flex;
gap:6px;
}

select{
padding:8px;
border-radius:8px;
}

#lang{
position:absolute;
top:10px;
right:10px;
}

</style>
</head>

<body>

<div id="login">

<h2>TOS LENG</h2>

<input id="room" placeholder="Room">

<input id="pass" placeholder="Password">

<input id="name" placeholder="Your Name">

<input id="startmoney" value="50000">

<button class="btn" onclick="join()">START</button>

</div>

<div id="topbar">

<div id="roomlabel"></div>

<div id="pot">POT: 0</div>

</div>

<select id="lang" onchange="setLang(this.value)">
<option value="en">EN</option>
<option value="kh">KH</option>
<option value="zh">中文</option>
</select>

<div id="table"></div>

<div id="controls">

<div class="row">
<button class="btn" onclick="deal()">Deal</button>
<button class="btn" onclick="reveal()">Reveal</button>
<button class="btn" onclick="reset()">Reset</button>
</div>

<div class="row">

<select id="target"></select>

<input id="amount" type="number" placeholder="Amount">

<button class="btn" onclick="sendMoney()">Send</button>

</div>

</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {getDatabase,ref,set,onValue,get,update} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBjsVUxlNjGUnYioHOlKmk1wEMoVTSVxLw",
authDomain:"the-family-card-game.firebaseapp.com",
databaseURL:"https://the-family-card-game-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"the-family-card-game"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room;
let player;

let LANG="en";

const TEXT={
en:{deal:"Deal",send:"Send"},
kh:{deal:"ចែក",send:"ផ្ញើ"},
zh:{deal:"发牌",send:"发送"}
};

window.setLang=function(l){
LANG=l;
}

window.join=function(){

room=document.getElementById("room").value;
player=document.getElementById("name").value;
let start=parseInt(document.getElementById("startmoney").value);

document.getElementById("login").style.display="none";

document.getElementById("roomlabel").innerText="ROOM: "+room;

set(ref(db,"rooms/"+room+"/money/"+player),start);

listen();

}

function listen(){

onValue(ref(db,"rooms/"+room),snap=>{

const data=snap.val();

if(!data)return;

const table=document.getElementById("table");
table.innerHTML="";

let players=Object.keys(data.money||{});

let pot=0;

players.forEach(p=>{

let m=data.money[p];

pot+=m;

const div=document.createElement("div");
div.className="player";

div.innerHTML=

"<b>"+p+"</b>"+
"<div class='money'>"+m+" riel</div>";

table.appendChild(div);

});

document.getElementById("pot").innerText="POT: "+pot;

const sel=document.getElementById("target");

sel.innerHTML="";

players.forEach(p=>{
if(p!=player){

let o=document.createElement("option");
o.value=p;
o.innerText=p;

sel.appendChild(o);

}
});

});

}

window.sendMoney=function(){

let to=document.getElementById("target").value;

let amount=parseInt(document.getElementById("amount").value);

get(ref(db,"rooms/"+room+"/money")).then(s=>{

let d=s.val();

let me=d[player]||0;

let other=d[to]||0;

me-=amount;
other+=amount;

update(ref(db),{

["rooms/"+room+"/money/"+player]:me,
["rooms/"+room+"/money/"+to]:other

});

});

}

window.deal=function(){

alert("Deal cards feature from your previous code can stay.");

}

window.reveal=function(){

alert("Reveal from your original code.");

}

window.reset=function(){

set(ref(db,"rooms/"+room),null);

}

</script>

</body>
</html>
