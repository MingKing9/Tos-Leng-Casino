<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tos Leng</title>

<style>
body{ margin:0; font-family:sans-serif; background:#0a2114; color:white; overflow:hidden; }
#login{ position:fixed; inset:0; background:black; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
input{ padding:12px; margin:6px; width:220px; border-radius:8px; border:none; text-align:center; }
button{ padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; }

#table{ height:40vh; position:relative; background:radial-gradient(circle,#1a5e37,#0a2114); }
.player{ position:absolute; transform:translate(-50%,-50%); text-align:center; }
.cards{ display:flex; gap:4px; margin-top:5px; }
.cards img{ width:40px; height:55px; border-radius:4px; }

/* CHAT TAKES HALF SCREEN */
#chatArea {
    height: 45vh; background: rgba(0,0,0,0.9); margin: 10px;
    padding: 10px; overflow-y: auto; border: 2px solid #1a5e37;
    border-radius: 10px; color: #00ff00; font-family: monospace;
}

.controls{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; padding:10px; }

/* MODAL */
#transferBox {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); 
    z-index:300; align-items:center; justify-content:center;
}
.player-option { background:#222; padding:15px; margin:5px; border-radius:8px; cursor:pointer; text-align:center; }
</style>
</head>

<body>

<div id="login">
    <h2 style="color:gold">TOS LENG</h2>
    <input id="room" placeholder="Room"><input id="name" placeholder="Name">
    <button id="startBtn">START</button>
</div>

<div id="transferBox">
    <div style="width:80%;" id="nameList"></div>
</div>

<div id="game" style="display:none">
    <div id="table"></div>
    <div id="chatArea"></div>
    <div class="controls">
        <button id="dealBtn">Deal</button>
        <button id="readyBtn">Ready</button>
        <button id="revealBtn">Reveal</button>
        <button id="moneyBtn" style="background:gold;">Transfer</button>
        <button id="resetBtn">Reset</button>
        <button id="chatBtn" style="background:#007bff; color:white;">Chat</button>
    </div>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import {getDatabase,ref,set,onValue,get,update,push} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"

const db = getDatabase(initializeApp({/* Your Config Here */}));
let room, player, ready=false;

// ... (Keep existing login logic)

// FIXED CHAT LISTENER: Ensure it pulls everything from 'history'
function listen() {
    onValue(ref(db, `rooms/${room}`), snap => {
        const data = snap.val() || {};
        // ... (Render players on table)
        
        const chatArea = document.getElementById("chatArea");
        chatArea.innerHTML = "";
        if(data.history) {
            Object.values(data.history).reverse().forEach(m => {
                const d = document.createElement("div");
                d.innerText = m;
                chatArea.appendChild(d);
            });
        }
    });
}

// FIXED TRANSFER: Closes immediately
document.getElementById("moneyBtn").onclick = async () => {
    const snap = await get(ref(db, `rooms/${room}/wallets`));
    const wallets = snap.val() || {};
    const others = Object.keys(wallets).filter(n => n !== player);
    
    const listDiv = document.getElementById("nameList");
    listDiv.innerHTML = "<h3>Select Player</h3>";
    others.forEach(target => {
        const btn = document.createElement("div");
        btn.className = "player-option";
        btn.innerText = target;
        btn.onclick = () => {
            document.getElementById("transferBox").style.display = "none"; // CLOSE IMMEDIATELY
            const amt = prompt(`Amount to send to ${target}:`);
            if(amt) {
                const updates = {};
                updates[`rooms/${room}/wallets/${player}`] = wallets[player] - amt;
                updates[`rooms/${room}/wallets/${target}`] = wallets[target] + amt;
                update(ref(db), updates);
                push(ref(db, `rooms/${room}/history`), `💸 ${player} -> ${target}: ${amt}៛`);
            }
        };
        listDiv.appendChild(btn);
    });
    document.getElementById("transferBox").style.display = "flex";
}

// FIXED CHAT: Directly prompts and pushes
document.getElementById("chatBtn").onclick = () => {
    const msg = prompt("Message:");
    if(msg) push(ref(db, `rooms/${room}/history`), `💬 ${player}: ${msg}`);
}
// ... (Rest of your game functions)
</script>
</body>
</html>
