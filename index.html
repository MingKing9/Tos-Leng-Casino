<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tos Leng - Classic Pro</title>
    <style>
        :root { --gold: #d4af37; --felt: #1a5e37; --wood: #3d2b1f; --safe-bottom: env(safe-area-inset-bottom); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

        /* Language Toggle Button */
        #lang-toggle { position: absolute; top: 50px; right: 20px; background: #333; color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; z-index: 10002; font-weight: bold; }

        #room-info-bar { position: fixed; top: 0; width: 100%; height: 44px; padding-top: env(safe-area-inset-top); background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; padding-left: 20px; padding-right: 20px; border-bottom: 1px solid #333; z-index: 1000; color: var(--gold); font-size: 13px; font-weight: 600; }
        #game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100vw; background: radial-gradient(circle, var(--felt) 0%, #0a2114 100%); }
        #poker-table { flex: 1; position: relative; margin: 60px 10px 10px 10px; border: 10px solid var(--wood); border-radius: 50px; box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5); }
        .player-spot { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 140px; }
        .player-badge { background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--gold); font-size: 11px; color: #fff; font-weight: 700; }
        .player-badge.is-ready { background: #27ae60; border-color: #fff; box-shadow: 0 0 12px #2ecc71; }
        .card-row { display: grid; grid-template-columns: repeat(3, 42px); grid-template-rows: repeat(2, 60px); justify-content: center; gap: 4px; margin-top: 5px; }
        .card-img { width: 42px; height: 60px; border-radius: 4px; transition: transform 0.2s; background: white; box-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
        .card-img.active { transform: translateY(-15px) scale(1.1); border: 2.5px solid var(--gold); z-index: 100; box-shadow: 0 0 15px var(--gold); }
        .controls-bar { background: #111; border-top: 1px solid #333; display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 8px; padding: 12px 12px calc(var(--safe-bottom) + 12px) 12px; }
        .action-group { display: flex; flex-direction: column; gap: 6px; }
        button { padding: 14px 0; border: none; border-radius: 12px; font-weight: 800; font-size: 11px; color: white; text-transform: uppercase; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; } .btn-blue { background: #2980b9; } .btn-green { background: #27ae60; } .btn-grey { background: #444; } .btn-reveal { background: #d35400; } .btn-reset { background: #c0392b; }
        #chat-box { position: fixed; bottom: -450px; left: 0; width: 100%; height: 400px; background: rgba(15, 15, 15, 0.98); border-top: 2px solid var(--gold); transition: bottom 0.3s ease; z-index: 2000; display: flex; flex-direction: column; border-radius: 25px 25px 0 0; }
        #chat-box.open { bottom: 0; } #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 15px; color: white; font-size: 14px; width: fit-content; max-width: 85%; }
        .msg-own { align-self: flex-end; background: var(--gold); color: #000; font-weight: 700; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-input { width: 85%; max-width: 320px; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--gold); background: #111; color: white; font-size: 16px; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <button id="lang-toggle" onclick="cycleLang()">🇰🇭 KM</button>
    <h1 style="color:var(--gold); margin-bottom:30px; letter-spacing: 2px;">TOS LENG</h1>
    <input id="roomInput" class="login-input" placeholder="ROOM NAME">
    <input id="passInput" class="login-input" type="password" placeholder="PASSWORD">
    <input id="nameInput" class="login-input" placeholder="YOUR NAME">
    <button id="btn-start" onclick="join()" style="width:85%; max-width:320px; background:var(--gold); color:black; font-size:16px;">START GAME</button>
</div>

<div id="room-info-bar">
    <span id="display-room">TABLE: -</span>
    <span id="display-name">PLAYER: -</span>
</div>

<div id="game-wrapper">
    <div id="poker-table"></div>
    <div class="controls-bar">
        <div class="action-group">
            <button id="btn-chat" class="btn-gold" onclick="toggleChat()">CHAT</button>
        </div>
        <div class="action-group">
            <button id="dealBtn" class="btn-blue" onclick="deal()">DEAL HAND</button>
            <button id="readyBtn" class="btn-green" style="display:none;" onclick="toggleReady(true)">READY</button>
            <button id="notReadyBtn" class="btn-grey" style="display:none;" onclick="toggleReady(false)">UNREADY</button>
        </div>
        <div class="action-group">
            <button id="btn-reveal" class="btn-reveal" onclick="reveal()">REVEAL</button>
            <button id="btn-reset" class="btn-reset" onclick="resetGame()">RESET</button>
        </div>
    </div>
</div>

<div id="chat-box">
    <div id="txt-close" style="padding: 12px; text-align: center; color: var(--gold); font-weight: bold; cursor:pointer;" onclick="toggleChat()">CLOSE CHAT</div>
    <div id="chat-messages"></div>
    <div style="padding:10px; display:flex; gap:8px; background:#000; padding-bottom: calc(var(--safe-bottom) + 10px);">
        <input id="chatInput" style="flex:1; padding:12px; border-radius:20px; border:none; background:#222; color:white;" placeholder="Message...">
        <button id="btn-send" onclick="sendChat()" style="width: 70px; background: var(--gold); color: black;">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const translations = {
        km: { start: "ចាប់ផ្តើមលេង", chat: "ជជែក", deal: "ចែកបៀ", ready: "រួចរាល់", unready: "មិនទាន់រួច", reveal: "បើកបៀ", reset: "លេងថ្មី", close: "បិទជជែក", send: "ផ្ញើ", flag: "🇰🇭 KM" },
        en: { start: "START GAME", chat: "CHAT", deal: "DEAL HAND", ready: "I'M READY", unready: "UNREADY", reveal: "REVEAL", reset: "RESET", close: "CLOSE CHAT", send: "SEND", flag: "🇺🇸 EN" },
        cn: { start: "开始游戏", chat: "聊天", deal: "发牌", ready: "准备", unready: "取消", reveal: "摊牌", reset: "重置", close: "关闭聊天", send: "发送", flag: "🇨🇳 CN" },
        jp: { start: "開始", chat: "チャット", deal: "配る", ready: "準備完了", unready: "未準備", reveal: "公開", reset: "リセット", close: "閉じる", send: "送信", flag: "🇯🇵 JP" }
    };
    let lang = 'en';
    window.cycleLang = () => {
        const keys = Object.keys(translations);
        lang = keys[(keys.indexOf(lang) + 1) % keys.length];
        const t = translations[lang];
        document.getElementById("lang-toggle").innerText = t.flag;
        document.getElementById("btn-start").innerText = t.start;
        document.getElementById("btn-chat").innerText = t.chat;
        document.getElementById("dealBtn").innerText = t.deal;
        document.getElementById("readyBtn").innerText = t.ready;
        document.getElementById("notReadyBtn").innerText = t.unready;
        document.getElementById("btn-reveal").innerText = t.reveal;
        document.getElementById("btn-reset").innerText = t.reset;
        document.getElementById("txt-close").innerText = t.close;
        document.getElementById("btn-send").innerText = t.send;
    };

    // --- PASTE YOUR FIREBASE LOGIC STARTING HERE ---
    const firebaseConfig = { apiKey: "AIzaSyBjsVUxlNjGUnYioHOlKmk1wEMoVTSVxLw", authDomain: "the-family-card-game.firebaseapp.com", databaseURL: "https://the-family-card-game-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "the-family-card-game" };
    // ... (All your remaining existing code)
</script>
</body>
</html>
